<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料体験申し込み | 元塾講師マサちゃんの自習室</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
        }
        #date[readonly] {
            cursor: pointer;
            background-color: white !important;
        }
        #date:disabled {
            cursor: not-allowed;
            background-color: #f1f5f9 !important;
        }
        /* ローディングアニメーション */
        .loader {
            border-top-color: #ffffff;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg overflow-hidden">
        <div class="bg-orange-500 p-6 text-white text-center">
            <h1 class="text-xl font-bold">無料体験お申し込み</h1>
            <p class="text-sm opacity-90 mt-1">元塾講師マサちゃんの自習室</p>
        </div>

        <form id="applyForm" class="p-6 space-y-5">
            <div>
                <label for="location" class="block text-sm font-bold text-gray-700 mb-1">会場</label>
                <select id="location" name="location" required class="block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500">
                    <option value="" disabled selected>会場を選択してください</option>
                    <option value="小布施町役場">小布施町役場</option>
                    <option value="北部コミュニティセンター">北部コミュニティセンター</option>
                </select>
            </div>

            <div>
                <label for="date" class="block text-sm font-bold text-gray-700 mb-1">体験希望日</label>
                <input type="text" id="date" name="date" required disabled
                    placeholder="先に会場を選択してください"
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500">
                <p id="dateHelp" class="mt-1 text-xs text-orange-600 font-medium"></p>
            </div>

            <div>
                <label for="grade" class="block text-sm font-bold text-gray-700 mb-1">学年</label>
                <select id="grade" name="grade" required class="block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500">
                    <option value="" disabled selected>学年を選択してください</option>
                    <option value="中学1年生">中学1年生</option>
                    <option value="中学2年生">中学2年生</option>
                    <option value="中学3年生">中学3年生</option>
                </select>
            </div>

            <div>
                <label for="student_name" class="block text-sm font-bold text-gray-700 mb-1">生徒名</label>
                <input type="text" id="student_name" name="student_name" required placeholder="氏名"
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500">
            </div>

            <div>
                <label for="parent_name" class="block text-sm font-bold text-gray-700 mb-1">保護者名</label>
                <input type="text" id="parent_name" name="parent_name" required placeholder="氏名"
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500">
            </div>

            <div>
                <label for="phone" class="block text-sm font-bold text-gray-700 mb-1">連絡先（電話番号）</label>
                <input type="tel" id="phone" name="phone" required placeholder="090-0000-0000"
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500">
            </div>

            <div>
                <label for="email" class="block text-sm font-bold text-gray-700 mb-1">メールアドレス</label>
                <input type="email" id="email" name="email" required placeholder="example@mail.com"
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500">
            </div>

            <div>
                <label for="remarks" class="block text-sm font-bold text-gray-700 mb-1">備考（相談したいこと等）</label>
                <textarea id="remarks" name="remarks" rows="2"
                    class="block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-500 focus:ring-orange-500"></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-lg font-bold text-white bg-orange-600 hover:bg-orange-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-orange-500 transition-all">
                <span id="btnText">内容を確認して送信する</span>
                <div id="btnLoader" class="hidden loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-6 w-6 ml-3"></div>
            </button>
        </form>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full flex items-center justify-center p-4">
        <div class="relative bg-white rounded-2xl shadow-xl max-w-sm w-full p-8 text-center">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-4">
                <svg class="h-10 w-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">送信が完了しました</h3>
            <p class="text-sm text-gray-500 mb-6 whitespace-pre-wrap" id="mailPreview"></p>
            <button id="close-modal" class="w-full bg-orange-500 text-white font-bold py-3 rounded-xl hover:bg-orange-600 transition-colors">
                閉じる
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // ★ここにGASのWebアプリURLを貼り付けてください
            const GAS_URL = 'https://script.google.com/macros/s/AKfycbyR66K5oY8M9M3_f-fA_A6_A6_A/exec';

            const form = document.getElementById('applyForm');
            const locationSelect = document.getElementById('location');
            const dateInput = document.getElementById('date');
            const gradeSelect = document.getElementById('grade');
            const studentNameInput = document.getElementById('student_name');
            const dateHelp = document.getElementById('dateHelp');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoader = document.getElementById('btnLoader');
            const modal = document.getElementById('modal');
            const mailPreview = document.getElementById('mailPreview');

            // 会場ごとの設定（例）
            const locationConfigs = {
                "小布施町役場": {
                    help: "※小布施町役場は土曜日のみ開催です",
                    enableDates: [
                        function(date) { return date.getDay() === 6; } // 土曜日のみ
                    ]
                },
                "北部コミュニティセンター": {
                    help: "※北部コミュニティセンターは平日も開催しています",
                    enableDates: [
                        function(date) { return date.getDay() !== 0 && date.getDay() !== 6; } // 平日のみ
                    ]
                }
            };

            // 日付選択カレンダーの初期化
            const fp = flatpickr("#date", {
                locale: "ja",
                dateFormat: "Y/m/d",
                minDate: "today",
                disableMobile: "true"
            });

            // 会場を選択した時の処理
            locationSelect.addEventListener('change', () => {
                const selectedLocation = locationSelect.value;
                if (selectedLocation) {
                    dateInput.removeAttribute('disabled');
                    dateInput.placeholder = "日付を選択してください";
                    
                    const config = locationConfigs[selectedLocation];
                    dateHelp.textContent = config.help;
                    fp.set('enable', config.enableDates);

                    // ★追加：会場を選んだら自動でカレンダーを開く
                    setTimeout(() => {
                        fp.open();
                    }, 100);
                }
            });

            // ★追加：学年を選択したら自動で「生徒名」にフォーカス
            gradeSelect.addEventListener('change', () => {
                if (gradeSelect.value) {
                    studentNameInput.focus();
                }
            });

            // フォーム送信処理
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                submitBtn.disabled = true;
                btnText.textContent = "送信中...";
                btnLoader.classList.remove('hidden');

                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());

                try {
                    await fetch(GAS_URL, {
                        method: 'POST',
                        mode: 'no-cors', 
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(data)
                    });

                    mailPreview.textContent = `【お申し込み内容の控え】\n会場：${data.location}\n希望日：${data.date}\n生徒名：${data.student_name} 様\n保護者：${data.parent_name} 様\n\n受付メールを送信しました。`;
                    modal.classList.remove('hidden');
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } catch (err) {
                    alert("送信中にエラーが発生しました。");
                } finally {
                    submitBtn.disabled = false;
                    btnText.textContent = "内容を確認して送信する";
                    btnLoader.classList.add('hidden');
                }
            });

            document.getElementById('close-modal').addEventListener('click', () => {
                modal.classList.add('hidden');
                form.reset();
                fp.clear();
                dateInput.setAttribute('disabled', 'true');
                dateInput.placeholder = "先に会場を選択してください";
                dateHelp.textContent = "";
            });
        });
    </script>
</body>
</html>

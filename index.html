<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料体験申し込み | 元塾講師マサちゃんの自習室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="bg-blue-600 text-white py-10 px-6 text-center shadow-lg">
        <h1 class="text-3xl font-bold">元塾講師マサちゃんの自習室</h1>
        <p class="mt-2 opacity-90">無料体験申し込みフォーム</p>
    </header>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="max-w-2xl w-full bg-white p-8 rounded-2xl shadow-xl">
            <form id="exp-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">会場 *</label>
                    <select id="venue" name="venue" required class="w-full rounded-lg border-slate-300 py-3">
                        <option value="" disabled selected>選択してください</option>
                        <option value="おぶせ岩松院 (火・金 19:00～21:00)">おぶせ岩松院 (火・金 19:00～21:00)</option>
                        <option value="すざかbota (月・木 18:00～20:00)">すざかbota (月・木 18:00～20:00)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">体験希望日 *</label>
                    <input type="text" id="date" name="date" required disabled placeholder="先に会場を選択" class="w-full rounded-lg border-slate-300 py-3 px-4 bg-slate-50">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold mb-2 text-slate-700">学年 *</label>
                        <select name="grade" required class="w-full rounded-lg border-slate-300 py-3">
                            <option value="中学1年">中学1年</option><option value="中学2年">中学2年</option><option value="中学3年">中学3年</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-2 text-slate-700">生徒氏名 *</label>
                        <input type="text" name="student_name" required class="w-full rounded-lg border-slate-300 py-3">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">保護者氏名 *</label>
                    <input type="text" name="parent_name" required class="w-full rounded-lg border-slate-300 py-3">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">電話番号 *</label>
                    <input type="tel" name="phone" required class="w-full rounded-lg border-slate-300 py-3">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">メールアドレス *</label>
                    <input type="email" name="email" required class="w-full rounded-lg border-slate-300 py-3">
                </div>
                <div>
                    <label class="block text-sm font-bold mb-2 text-slate-700">備考</label>
                    <textarea name="memo" class="w-full rounded-lg border-slate-300"></textarea>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition flex justify-center items-center">
                    <span id="btn-text">送信する</span>
                    <div id="btn-loader" class="hidden ml-3 loader"></div>
                </button>
            </form>
        </div>
    </main>

    <div id="success-modal" class="hidden fixed inset-0 bg-slate-900/80 flex items-center justify-center p-4 z-50">
        <div class="bg-white p-8 rounded-2xl max-w-lg w-full text-center shadow-2xl">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-bold mb-4">お申し込み完了</h2>
            <p class="text-slate-600 mb-6">確認メールを送信しました。内容をご確認ください。</p>
            <div id="mail-preview" class="text-left bg-slate-50 p-4 rounded-lg text-sm mb-6 whitespace-pre-wrap border"></div>
            <button onclick="location.reload()" class="w-full bg-slate-800 text-white py-3 rounded-lg font-bold">閉じる</button>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzjWWuwi7fcekeCj4B3EukdStq246Urb0v3NfBIv7jA4voPVcVnNPDnKJE_fL7cWmAh/exec";

        const venue = document.getElementById('venue');
        const dateInput = document.getElementById('date');
        const fp = flatpickr(dateInput, { locale: "ja", minDate: "today", dateFormat: "Y年m月d日(D)", disable: [() => true] });

        venue.addEventListener('change', () => {
            dateInput.disabled = false;
            dateInput.classList.remove('bg-slate-50');
            const isObuse = venue.value.includes('おぶせ');
            fp.set('disable', [(date) => isObuse ? (date.getDay() !== 2 && date.getDay() !== 5) : (date.getDay() !== 1 && date.getDay() !== 4)]);
            fp.clear();
        });

        document.getElementById('exp-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            document.getElementById('btn-loader').classList.remove('hidden');

            const fd = new FormData(e.target);
            const payload = {
                action: "submitExperience",
                data: {
                    venue: fd.get('venue'),
                    date: fd.get('date'),
                    grade: fd.get('grade'),
                    studentName: fd.get('student_name'),
                    parentName: fd.get('parent_name'),
                    phone: fd.get('phone'),
                    email: fd.get('email'),
                    memo: fd.get('memo')
                }
            };

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if (result.status === "success") {
                    document.getElementById('mail-preview').textContent = `【内容控え】\n会場：${payload.data.venue}\n日程：${payload.data.date}\n生徒名：${payload.data.studentName} 様`;
                    document.getElementById('success-modal').classList.remove('hidden');
                }
            } catch (err) {
                alert("送信に失敗しました。もう一度お試しください。");
            } finally {
                btn.disabled = false;
                document.getElementById('btn-loader').classList.add('hidden');
            }
        });
    </script>
</body>
</html>

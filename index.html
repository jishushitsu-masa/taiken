```html
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>無料体験申し込み</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-md w-full max-w-lg">
<h1 class="text-xl font-bold mb-6 text-center">無料体験申し込み</h1>

<form id="form" class="space-y-4">

<select name="location" required class="w-full border p-2 rounded">
<option value="">会場選択</option>
<option value="小布施">小布施</option>
<option value="須坂">須坂</option>
</select>

<input type="date" name="date" required class="w-full border p-2 rounded">

<select name="grade" class="w-full border p-2 rounded">
<option>中1</option>
<option>中2</option>
<option>中3</option>
</select>

<input name="student_name" placeholder="生徒氏名" required class="w-full border p-2 rounded">
<input name="parent_name" placeholder="保護者氏名" required class="w-full border p-2 rounded">
<input name="phone" placeholder="電話番号" required class="w-full border p-2 rounded">
<input name="email" type="email" placeholder="メール" required class="w-full border p-2 rounded">

<textarea name="remarks" placeholder="備考" class="w-full border p-2 rounded"></textarea>

<button class="w-full bg-blue-600 text-white p-3 rounded">送信</button>

</form>

<p id="msg" class="text-center mt-4"></p>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwuZbLB1dLdn5U3dGbG3vkN3aK0GmTRAZ7ZXZtSVTG51CD0ZzLHNQLCkBOolN3I-q_b/exec";

document.getElementById("form").addEventListener("submit", async (e) => {
e.preventDefault();

const data = Object.fromEntries(new FormData(e.target));

try {
const res = await fetch(GAS_URL, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(data)
});

if (!res.ok) throw new Error();

document.getElementById("msg").textContent = "送信完了しました";
e.target.reset();

} catch {
document.getElementById("msg").textContent = "送信エラー";
}
});
</script>

</body>
</html>
```

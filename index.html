<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料体験申し込み | 元塾講師マサちゃんの自習室</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
        }
        #date[readonly] {
            cursor: pointer;
            background-color: white !important;
        }
        #date:disabled {
            cursor: not-allowed;
            background-color: #f1f5f9 !important;
        }
        /* ローディングアニメーション */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-blue-600 text-white shadow-lg">
        <div class="max-w-3xl mx-auto py-12 px-6 text-center">
            <h1 class="text-2xl sm:text-4xl font-bold tracking-tight mb-3">元塾講師マサちゃんの自習室</h1>
            <div class="inline-block px-4 py-1 bg-blue-500 rounded-full text-sm font-medium">
                無料体験申し込みフォーム
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-start justify-center py-12 px-4 sm:px-6">
        <div class="max-w-2xl w-full bg-white p-6 sm:p-10 rounded-2xl shadow-xl border border-slate-200">
            <div class="mb-10">
                <h2 class="text-xl font-bold mb-4 flex items-center">
                    <span class="w-1.5 h-6 bg-blue-600 rounded-full mr-3"></span>
                    お申し込み情報の入力
                </h2>
            </div>

            <form id="application-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">会場 <span class="text-red-500">*</span></label>
                    <select id="location" name="location" required class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm py-3">
                        <option value="" disabled selected>会場を選択してください</option>
                        <option value="おぶせ岩松院 (火・金 19:00～21:00)">おぶせ岩松院 (火・金のみ 19:00～21:00)</option>
                        <option value="すざかbota (月・木 18:00～20:00)">すざかbota (月・木のみ 18:00～20:00)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">体験希望日 <span class="text-red-500">*</span></label>
                    <input type="text" id="date" name="date" required disabled placeholder="先に会場を選択してください" 
                           class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm py-3 px-4">
                    <p id="date-help" class="mt-2 text-xs text-blue-600 font-medium"></p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">学年 <span class="text-red-500">*</span></label>
                        <select id="grade" name="grade" required class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm py-3">
                            <option value="" disabled selected>選択...</option>
                            <option value="中学1年">中学1年</option>
                            <option value="中学2年">中学2年</option>
                            <option value="中学3年">中学3年</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">生徒氏名 <span class="text-red-500">*</span></label>
                        <input type="text" id="student_name" name="student_name" required placeholder="長野 太郎" class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm py-3">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">保護者氏名 <span class="text-red-500">*</span></label>
                    <input type="text" id="parent_name" name="parent_name" required placeholder="長野 花子" class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm py-3">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">電話番号 <span class="text-red-500">*</span></label>
                    <input type="tel" id="phone" name="phone" required placeholder="09012345678" class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm py-3">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">メールアドレス <span class="text-red-500">*</span></label>
                    <input type="email" id="email" name="email" required placeholder="sample@example.com" class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm py-3">
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">その他備考欄</label>
                    <textarea id="remarks" name="remarks" rows="3" class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"></textarea>
                </div>

                <div class="pt-6">
                    <button type="submit" id="submit-btn" class="w-full flex justify-center items-center py-4 px-6 border border-transparent rounded-xl shadow-lg text-lg font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none transition-all active:scale-95">
                        <span id="btn-text">内容を確認して送信する</span>
                        <div id="btn-loader" class="hidden ml-3 loader"></div>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <div id="success-modal" class="hidden fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 px-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-md w-full text-center">
            <h3 class="text-2xl font-bold text-slate-900 mb-4">お申し込み完了！</h3>
            <p class="text-slate-600 mb-6" id="mail-preview"></p>
            <button onclick="location.reload()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl">閉じる</button>
        </div>
    </div>

    <script>
        // ★ここにGoogle Apps Scriptで発行した「最新のWebアプリURL」を貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzjWWuwi7fcekeCj4B3EukdStq246Urb0v3NfBIv7jA4voPVcVnNPDnKJE_fL7cWmAh/exec";

        document.addEventListener('DOMContentLoaded', function() {
            const locationSelect = document.getElementById('location');
            const dateInput = document.getElementById('date');
            const dateHelp = document.getElementById('date-help');
            const form = document.getElementById('application-form');
            const submitBtn = document.getElementById('submit-btn');
            const btnLoader = document.getElementById('btn-loader');
            const modal = document.getElementById('success-modal');
            const mailPreview = document.getElementById('mail-preview');

            const fp = flatpickr(dateInput, {
                locale: "ja", minDate: "today", dateFormat: "Y年m月d日(D)",
                disable: [() => true], disableMobile: "true"
            });

            locationSelect.addEventListener('change', function() {
                dateInput.removeAttribute('disabled');
                const loc = this.value;
                let disableFunc = loc.includes('おぶせ') ? (d => d.getDay()!==2 && d.getDay()!==5) : (d => d.getDay()!==1 && d.getDay()!==4);
                fp.set('disable', [disableFunc]);
                dateHelp.textContent = loc.includes('おぶせ') ? "【受付中】火曜・金曜のみ" : "【受付中】月曜・木曜のみ";
            });

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                submitBtn.disabled = true;
                btnLoader.classList.remove('hidden');

                const fd = new FormData(form);
                const payload = {
                    location: fd.get('location'),
                    date: fd.get('date'),
                    grade: fd.get('grade'),
                    student_name: fd.get('student_name'),
                    parent_name: fd.get('parent_name'),
                    phone: fd.get('phone'),
                    email: fd.get('email'),
                    remarks: fd.get('remarks')
                };

                try {
                    // 確実にデータを届けるため JSON 送信
                    await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    
                    mailPreview.textContent = `${payload.parent_name} 様、お申し込みありがとうございました。確認メールをお送りしました。`;
                    modal.classList.remove('hidden');
                } catch (err) {
                    alert("送信に失敗しました。GASのデプロイ設定を確認してください。");
                } finally {
                    submitBtn.disabled = false;
                    btnLoader.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>

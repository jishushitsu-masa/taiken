<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料体験申し込み | 元塾講師マサちゃんの自習室</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <!-- Flatpickr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>

    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f3f4f6;
        }
        #date[readonly] {
            cursor: pointer;
            background-color: white;
        }
        #date:disabled {
            cursor: not-allowed;
            background-color: #f9fafb;
        }
        /* ローディングアニメーション */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <header class="bg-blue-600 text-white shadow-md">
        <div class="max-w-3xl mx-auto py-10 px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-2xl sm:text-3xl font-bold tracking-wider">元塾講師マサちゃんの自習室</h1>
            <p class="mt-2 text-blue-100 text-sm sm:text-base">無料体験申し込みフォーム</p>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center py-10 px-4 sm:px-6 lg:px-8">
        <div class="max-w-2xl w-full bg-white p-8 rounded-xl shadow-lg border border-gray-100">
            <p class="text-gray-600 mb-8 text-sm sm:text-base leading-relaxed">
                無料体験をご希望の方は、以下のフォームよりお申し込みください。<br>
                <span class="text-red-500">*</span> は必須項目です。
            </p>

            <form id="application-form" class="space-y-6">
                <!-- 会場選択 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">会場 <span class="text-red-500">*</span></label>
                    <select id="location" name="location" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                        <option value="" disabled selected>会場を選択してください</option>
                        <option value="おぶせ岩松院 (火・金のみ 19:00～21:00)">おぶせ岩松院 (火・金のみ 19:00～21:00)</option>
                        <option value="すざかbota (月・木のみ 18:00～20:00)">すざかbota (月・木のみ 18:00～20:00)</option>
                    </select>
                </div>

                <!-- 日付選択 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">体験希望日 <span class="text-red-500">*</span></label>
                    <input type="text" id="date" name="date" required disabled placeholder="先に会場を選択してください" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                    <p id="date-help" class="mt-1 text-xs text-blue-600 italic"></p>
                </div>

                <!-- 学年選択 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">学年 <span class="text-red-500">*</span></label>
                    <select id="grade" name="grade" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                        <option value="" disabled selected>学年を選択してください</option>
                        <option value="1年">中学1年</option>
                        <option value="2年">中学2年</option>
                        <option value="3年">中学3年</option>
                    </select>
                </div>

                <!-- 生徒名 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">生徒名 <span class="text-red-500">*</span></label>
                    <input type="text" id="student_name" name="student_name" required placeholder="例：長野 太郎" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                </div>

                <!-- 保護者名 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">保護者名 <span class="text-red-500">*</span></label>
                    <input type="text" id="parent_name" name="parent_name" required placeholder="例：長野 花子" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                </div>

                <!-- 電話番号 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">電話番号 <span class="text-red-500">*</span></label>
                    <input type="tel" id="phone" name="phone" required placeholder="例：09012345678" oninput="this.value = this.value.replace(/[^0-9]/g, '');" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                </div>

                <!-- メールアドレス -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">メールアドレス <span class="text-red-500">*</span></label>
                    <input type="email" id="email" name="email" required placeholder="例：sample@example.com" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                </div>

                <!-- 備考欄 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">その他備考欄</label>
                    <textarea id="remarks" name="remarks" rows="3" placeholder="ご質問などあればご記入ください" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"></textarea>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submit-btn" class="w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-md shadow-sm text-lg font-bold text-white bg-blue-600 hover:bg-blue-700 transition-all disabled:opacity-50">
                        <span id="btn-text">入力内容を送信する</span>
                        <div id="btn-loader" class="hidden ml-3 loader"></div>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <!-- 完了モーダル -->
    <div id="success-modal" class="hidden fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50 px-4 py-6">
        <div class="bg-white p-6 sm:p-10 rounded-xl shadow-2xl max-w-2xl w-full text-center overflow-y-auto max-h-full">
            <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 mb-6">
                <svg class="h-10 w-10 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h3 class="text-2xl font-bold text-gray-900 mb-4">お申し込みが完了しました</h3>
            <p class="text-gray-600 mb-6 text-sm sm:text-base">
                ご入力いただいたメールアドレス宛に自動返信メールを送信しました。<br class="hidden sm:block">
                運営側（jishushitsu.masa@gmail.com）へも通知されました。
            </p>
            
            <div class="text-left bg-gray-50 p-6 rounded-lg text-xs sm:text-sm border border-gray-200 mb-8 font-sans whitespace-pre-wrap leading-relaxed shadow-inner" id="mail-preview">
                <!-- 送信メールの内容 -->
            </div>

            <button id="close-modal" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-md transition-colors text-lg shadow-md">
                トップに戻る
            </button>
        </div>
    </div>

    <footer class="bg-gray-800 text-gray-400 py-8 text-center text-sm">
        <p>&copy; 2026 元塾講師マサちゃんの自習室 All rights reserved.</p>
    </footer>

    <script>
        const apiKey = ""; // APIキーは環境によって自動補完されます

        document.addEventListener('DOMContentLoaded', function() {
            const locationSelect = document.getElementById('location');
            const dateInput = document.getElementById('date');
            const dateHelp = document.getElementById('date-help');
            const form = document.getElementById('application-form');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const modal = document.getElementById('success-modal');
            const mailPreview = document.getElementById('mail-preview');

            const fp = flatpickr(dateInput, {
                locale: "ja",
                minDate: "today",
                disable: [() => true]
            });

            locationSelect.addEventListener('change', function() {
                const loc = this.value;
                dateInput.disabled = false;
                dateInput.value = '';

                if (loc.includes('おぶせ')) {
                    dateHelp.textContent = "※おぶせ岩松院は 火曜日・金曜日 のみ予約可能です。";
                    fp.set('disable', [(date) => (date.getDay() !== 2 && date.getDay() !== 5)]);
                } else {
                    dateHelp.textContent = "※すざかbotaは 月曜日・木曜日 のみ予約可能です。";
                    fp.set('disable', [(date) => (date.getDay() !== 1 && date.getDay() !== 4)]);
                }
            });

            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                // 送信中UI
                submitBtn.disabled = true;
                btnText.textContent = "送信中...";
                btnLoader.classList.remove('hidden');

                const formData = new FormData(form);
                const data = Object.fromEntries(formData.entries());

                // 共通の通知内容
                const allItems = `
【お申し込み内容】
会場：${data.location}
体験希望日：${data.date}
学年：${data.grade}
生徒名：${data.student_name} 様
保護者名：${data.parent_name} 様
電話番号：${data.phone}
メールアドレス：${data.email}
その他備考欄：${data.remarks || 'なし'}
`.trim();

                // 返信メールテンプレート
                const userMailBody = `
この度は
「元塾講師マサちゃんの自習室」の無料体験へお申し込みいただきありがとうございます。
受付が完了しました！

${allItems}

持ち物
自主学習できる教材（教材の解答も持ってきてください）
飲み物（食べ物は不可）

注意事項
帰りは遅い時間になるため必ず保護者さまのお迎えをお願いします。

その他・キャンセルについて
日程の変更やキャンセルの場合はお手数ですが以下より手続きをお願いします。

当日はどうぞよろしくお願いします。

----------------
元塾講師マサちゃんの自習室
碓井雅也
080-8155-9759
jishushitsu.masa@gmail.com
----------------`.trim();

                // Geminiによる送信処理（シミュレート）
                try {
                    const prompt = `
以下の内容を2通のメールとして送信処理を完了させてください。
1. 送信先: jishushitsu.masa@gmail.com 宛 (運営側通知)
2. 送信先: ${data.email} 宛 (ユーザー返信)

【内容】
${userMailBody}
`;

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });

                    if (!response.ok) throw new Error('API Error');

                    // 成功時表示
                    mailPreview.textContent = userMailBody;
                    modal.classList.remove('hidden');
                } catch (err) {
                    alert("送信中にエラーが発生しました。インターネット接続を確認し、もう一度お試しください。");
                } finally {
                    submitBtn.disabled = false;
                    btnText.textContent = "入力内容を送信する";
                    btnLoader.classList.add('hidden');
                }
            });

            document.getElementById('close-modal').addEventListener('click', () => {
                modal.classList.add('hidden');
                form.reset();
                dateInput.disabled = true;
                dateHelp.textContent = "";
            });
        });
    </script>
</body>
</html>

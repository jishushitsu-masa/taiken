<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体験授業申込フォーム</title>
    <style>
        :root {
            --primary-color: #ff9800;
            --primary-hover: #f57c00;
            --bg-color: #fff5e6;
        }
        body {
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffe0b2;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>体験授業申込フォーム</h2>
        <form id="experience-form">
            <div class="form-group">
                <label>希望会場</label>
                <select name="venue" required>
                    <option value="">選択してください</option>
                    <option value="おぶせ岩松院会場">おぶせ岩松院会場</option>
                    <option value="すざかシルキー会場">すざかシルキー会場</option>
                </select>
            </div>
            <div class="form-group">
                <label>体験希望日</label>
                <input type="date" name="date" required>
            </div>
            <div class="form-group">
                <label>学年</label>
                <select name="grade" required>
                    <option value="">選択してください</option>
                    <option value="中1">中1</option>
                    <option value="中2">中2</option>
                    <option value="中3">中3</option>
                </select>
            </div>
            <div class="form-group">
                <label>生徒氏名</label>
                <input type="text" name="studentName" required>
            </div>
            <div class="form-group">
                <label>保護者氏名</label>
                <input type="text" name="parentName" required>
            </div>
            <div class="form-group">
                <label>電話番号</label>
                <input type="tel" name="phone" required>
            </div>
            <div class="form-group">
                <label>メールアドレス</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>備考（あれば）</label>
                <textarea name="memo" rows="3"></textarea>
            </div>
            <button type="submit" id="submit-btn">申し込む</button>
        </form>
        <div id="loading" class="loading">送信中...</div>
    </div>

    <script>
        // 設定された新しいGASのURL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCUmZT4HSaGpqmAUYV2zLTtIUwjQVHlbR_1aYNrh1tAQ9LDSi-Rzad17Y-Bt73iCSmGQ/exec";

        document.getElementById('experience-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submit-btn');
            const loading = document.getElementById('loading');
            
            btn.disabled = true;
            loading.style.display = 'block';

            const formData = new FormData(this);
            const data = {
                venue: formData.get('venue'),
                date: formData.get('date'),
                grade: formData.get('grade'),
                studentName: formData.get('studentName'),
                parentName: formData.get('parentName'),
                phone: formData.get('phone'),
                email: formData.get('email'),
                memo: formData.get('memo')
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "submitExperience",
                        data: data
                    })
                });

                if (response.ok) {
                    alert('お申し込みありがとうございます。送信が完了しました。');
                    this.reset();
                } else {
                    throw new Error('エラーが発生しました');
                }
            } catch (error) {
                alert('送信に失敗しました。時間をおいて再度お試しください。');
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>

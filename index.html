<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料体験 申込フォーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .form-container { max-width: 500px; margin: 2rem auto; background: white; padding: 2rem; border-radius: 1rem; shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body>
    <div class="form-container">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">無料体験 申込フォーム</h1>
        <form id="experience-form" class="space-y-4">
            <div><label class="block text-sm font-bold text-gray-700">会場</label>
                <select name="venue" required class="w-full border p-3 rounded-lg"><option value="">選択してください</option><option value="おぶせ岩松院会場">おぶせ岩松院会場</option><option value="すざかシルキー会場">すざかシルキー会場</option></select>
            </div>
            <div><label class="block text-sm font-bold text-gray-700">体験希望日</label><input type="date" name="date" required class="w-full border p-3 rounded-lg"></div>
            <div><label class="block text-sm font-bold text-gray-700">学年</label>
                <select name="grade" required class="w-full border p-3 rounded-lg"><option value="">選択してください</option><option value="中1">中1</option><option value="中2">中2</option><option value="中3">中3</option></select>
            </div>
            <div><label class="block text-sm font-bold text-gray-700">生徒氏名</label><input type="text" name="studentName" required class="w-full border p-3 rounded-lg"></div>
            <div><label class="block text-sm font-bold text-gray-700">保護者氏名</label><input type="text" name="parentName" required class="w-full border p-3 rounded-lg"></div>
            <div><label class="block text-sm font-bold text-gray-700">電話番号</label><input type="tel" name="phone" required class="w-full border p-3 rounded-lg"></div>
            <div><label class="block text-sm font-bold text-gray-700">メールアドレス</label><input type="email" name="email" required class="w-full border p-3 rounded-lg"></div>
            <div><label class="block text-sm font-bold text-gray-700">備考・質問など</label><textarea name="memo" class="w-full border p-3 rounded-lg" rows="3"></textarea></div>
            <button type="button" onclick="submitForm()" id="submit-btn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-lg shadow hover:bg-blue-700 transition-all">申し込む</button>
        </form>
        <div id="success-msg" class="hidden text-center py-10"><div class="text-5xl mb-4">✅</div><h2 class="text-xl font-bold text-gray-800 mb-2">送信完了しました</h2><p class="text-gray-500 text-sm">確認後、担当者よりご連絡いたします。</p></div>
    </div>

    <script>
        // ★ここにデプロイ後の新しいURLを貼り付けてください
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxCUmZT4HSaGpqmAUYV2zLTtIUwjQVHlbR_1aYNrh1tAQ9LDSi-Rzad17Y-Bt73iCSmGQ/exec"; 

        async function submitForm() {
            const form = document.getElementById('experience-form');
            if(!form.checkValidity()) return form.reportValidity();
            
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerHTML = "送信中...";
            btn.classList.add('opacity-50');

            const data = {
                venue: form.venue.value,
                date: form.date.value,
                grade: form.grade.value,
                studentName: form.studentName.value,
                parentName: form.parentName.value,
                phone: form.phone.value,
                email: form.email.value,
                memo: form.memo.value
            };

            try {
                const res = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "submitExperience", data: data })
                });
                if(res.ok) {
                    form.classList.add('hidden');
                    document.getElementById('success-msg').classList.remove('hidden');
                }
            } catch (e) {
                alert("送信に失敗しました。時間をおいて再度お試しください。");
                btn.disabled = false;
                btn.innerHTML = "申し込む";
                btn.classList.remove('opacity-50');
            }
        }
    </script>
</body>
</html>
